name: Build & deploy H2A site
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history so the site can show per-page "last updated" dates
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install (Python)
        run: pip install -r requirements.txt -r reference/requirements.txt
      - name: Install (issuer-service)
        run: npm --prefix reference/issuer-service ci
      - name: Validate schemas + examples (gate)
        run: python scripts/validate-schemas.py
      - name: Verify reference implementation (gate)
        run: python scripts/check-reference.py
      - name: Typecheck issuer-service (gate)
        run: npm --prefix reference/issuer-service run typecheck
      - name: Cross-language interop — TS signs, Python verifies (gate)
        run: |
          npm --prefix reference/issuer-service run emit-interop -- "$RUNNER_TEMP/interop"
          python scripts/check-interop.py "$RUNNER_TEMP/interop"
      - name: Build site
        run: python site/build.py
      - uses: actions/upload-pages-artifact@v3
        with: { path: site/_out }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
